<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help Center</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1f73b7" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Help Center" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1f73b7; --blue-hover: #1a5e9a; --blue-glow: rgba(31,115,183,.15);
      --bg: #f3f4f6; --surface: #ffffff; --surface-2: #f8f9fa; --surface-3: #eef0f2;
      --border: #d8dde1; --border-light: #e9ebec;
      --text: #1a1a1a; --text-2: #49545c; --text-3: #8a939a;
      --green: #2e7d32; --green-bg: #e6f4ea; --green-border: #a8d5b5;
      --err-bg: #fbeaea; --err-border: #f3b8b8; --err-text: #992222;
      --radius-s: 8px; --radius-m: 12px; --radius-l: 16px; --radius-xl: 20px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg); display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px; -webkit-font-smoothing: antialiased;
    }
    #app {
      width: 100%; max-width: 680px; background: var(--surface);
      border-radius: var(--radius-xl); border: 1px solid var(--border);
      display: flex; flex-direction: column; height: 93vh; max-height: 820px;
      box-shadow: 0 1px 4px rgba(0,0,0,.05), 0 6px 24px rgba(0,0,0,.08);
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      padding: 14px 18px; border-bottom: 1px solid var(--border-light);
      display: flex; align-items: center; gap: 11px; flex-shrink: 0;
      background: var(--surface);
    }
    .logo {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(145deg, #1f73b7, #0d5a9e);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(31,115,183,.3);
    }
    .logo svg { width: 18px; height: 18px; fill: #fff; }
    .header-info { display: flex; flex-direction: column; gap: 1px; }
    .header-title { font-size: 14px; font-weight: 650; color: var(--text); letter-spacing: -.01em; }
    .header-sub { font-size: 11px; color: var(--text-3); }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background .3s; flex-shrink: 0; }
    #status-dot.ready { background: var(--green); }
    .hdr-btn { margin-left: auto; width: 30px; height: 30px; border-radius: var(--radius-s); border: 1px solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-3); transition: background .15s, color .15s; flex-shrink: 0; }
    .hdr-btn:hover { background: var(--surface-2); color: var(--text-2); }
    .hdr-btn.open { background: var(--surface-3); color: var(--text); }
    .hdr-btn svg { width: 15px; height: 15px; }

    /* ── Config panel ── */
    #config { overflow: hidden; max-height: 160px; opacity: 1; transition: max-height .3s cubic-bezier(.4,0,.2,1), opacity .25s; border-bottom: 1px solid var(--border-light); background: var(--surface-2); }
    #config.collapsed { max-height: 0; opacity: 0; }
    .config-inner { padding: 13px 18px 15px; display: flex; flex-direction: column; gap: 9px; }
    .config-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
    .field label { font-size: 10.5px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .05em; }
    .field input { padding: 7px 11px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius-s); background: var(--surface); color: var(--text); outline: none; font-family: inherit; transition: border-color .15s, box-shadow .15s; }
    .field input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
    .field input::placeholder { color: var(--text-3); }
    .provider-wrap { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
    .provider-wrap label { font-size: 10.5px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .05em; }
    .provider-tabs { display: flex; background: var(--surface-3); border-radius: var(--radius-s); padding: 2px; border: 1px solid var(--border); }
    .pvtab { padding: 5px 11px; font-size: 12px; font-weight: 600; border: none; background: transparent; cursor: pointer; border-radius: 6px; color: var(--text-3); font-family: inherit; transition: background .15s, color .15s; }
    .pvtab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .config-hint { font-size: 11px; color: var(--text-3); line-height: 1.5; }

    /* ── Messages ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 22px 20px;
      display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .msg { display: flex; flex-direction: column; max-width: 88%; gap: 6px; animation: msgIn .2s ease both; }
    @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.agent { align-self: flex-start; align-items: flex-start; }
    .msg-time { font-size: 10px; color: var(--text-3); padding: 0 4px; }
    .bubble {
      padding: 11px 15px; border-radius: var(--radius-l); font-size: 14px;
      line-height: 1.65; color: var(--text);
    }
    .user .bubble { background: var(--blue); color: #fff; border-bottom-right-radius: 4px; }
    .agent .bubble { background: var(--surface-2); border: 1px solid var(--border-light); border-bottom-left-radius: 4px; }
    .bubble p { margin: 4px 0; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 4px 0; }
    .bubble li { margin: 3px 0; }
    .bubble strong { font-weight: 650; }

    /* ── Sources ── */
    .sources { display: flex; flex-direction: column; gap: 4px; margin-top: 2px; }
    .sources-label { font-size: 10.5px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .04em; padding: 0 2px; }
    .source-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface);
      font-size: 12px; color: var(--text-2); cursor: pointer;
      transition: border-color .12s, color .12s, background .12s;
      text-decoration: none; max-width: 100%;
    }
    .source-chip:hover { border-color: var(--blue); color: var(--blue); background: #eaf3fb; }
    .source-chip svg { width: 11px; height: 11px; flex-shrink: 0; opacity: .6; }
    .source-chip span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Suggestions ── */
    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; }
    .chip {
      font-size: 12.5px; padding: 6px 13px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface); color: var(--text-2);
      cursor: pointer; transition: border-color .12s, color .12s, background .12s, transform .1s;
      line-height: 1.4;
    }
    .chip:hover { background: #eaf3fb; border-color: var(--blue); color: var(--blue); transform: translateY(-1px); }
    .chip:disabled { opacity: .45; cursor: default; transform: none; }

    /* ── Typing indicator ── */
    .typing-wrap { padding: 3px 0; }
    .typing { display: flex; gap: 5px; align-items: center; height: 20px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); animation: bop 1.2s infinite; }
    .dot:nth-child(2){animation-delay:.18s} .dot:nth-child(3){animation-delay:.36s}
    @keyframes bop { 0%,60%,100%{transform:translateY(0);opacity:.5} 30%{transform:translateY(-5px);opacity:1} }

    /* ── Input bar ── */
    #inputbar {
      padding: 13px 18px; border-top: 1px solid var(--border-light);
      display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
    }
    #userInput {
      flex: 1; resize: none; font-size: 14px; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: var(--radius-m);
      font-family: inherit; line-height: 1.5; color: var(--text); outline: none;
      max-height: 120px; background: var(--surface-2);
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    #userInput:focus { border-color: var(--blue); background: var(--surface); box-shadow: 0 0 0 3px var(--blue-glow); }
    #userInput::placeholder { color: var(--text-3); }
    #sendBtn {
      width: 40px; height: 40px; border-radius: var(--radius-m); border: none;
      background: var(--blue); color: #fff; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s;
      box-shadow: 0 1px 4px rgba(31,115,183,.25);
    }
    #sendBtn:hover { background: var(--blue-hover); }
    #sendBtn:active { transform: scale(.91); }
    #sendBtn:disabled { background: #d0d5da; cursor: default; transform: none; box-shadow: none; }
    #sendBtn svg { width: 16px; height: 16px; fill: #fff; }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      body { padding: 0; align-items: stretch; }
      #app { border-radius: 0; border: none; box-shadow: none; height: 100dvh; max-height: none; }
      #config { max-height: 320px; }
      .config-row { flex-direction: column; align-items: stretch; }
      .field { min-width: unset; }
      .provider-wrap { width: 100%; }
      .provider-tabs { width: 100%; }
      .field input { font-size: 16px; }
      #messages { padding: 16px 14px; }
      .msg { max-width: 92%; }
      #inputbar { padding: 10px 12px; padding-bottom: max(10px, calc(env(safe-area-inset-bottom) + 6px)); }
      #userInput { font-size: 16px; }
      #sendBtn { width: 44px; height: 44px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <div class="header-info">
      <span class="header-title">Help Center</span>
      <span class="header-sub">Ask me anything</span>
    </div>
    <div id="status-dot" title="Connecting…"></div>
    <button id="settingsBtn" class="hdr-btn" onclick="toggleConfig()" title="API key settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
  </div>

  <div id="config" class="collapsed">
    <div class="config-inner">
      <div class="config-row">
        <div class="field" id="key-field">
          <label id="key-label">Claude API Key</label>
          <input type="password" id="llmKey" placeholder="sk-ant-..." />
        </div>
        <div class="provider-wrap">
          <label>Provider</label>
          <div class="provider-tabs">
            <button class="pvtab" onclick="setProvider('groq')">Groq</button>
            <button class="pvtab active" onclick="setProvider('anthropic')">Claude</button>
            <button class="pvtab" onclick="setProvider('openai')">OpenAI</button>
          </div>
        </div>
      </div>
      <div class="config-hint">Optional — leave blank to use the server's configured key.</div>
    </div>
  </div>

  <div id="messages">
    <div class="msg agent">
      <div class="bubble">
        Hi! I can answer questions about our Help Center articles. What would you like to know?
      </div>
      <div class="chips" id="suggestion-chips"></div>
    </div>
  </div>

  <div id="inputbar">
    <textarea id="userInput" rows="1" placeholder="Ask a question…"></textarea>
    <button id="sendBtn" onclick="send()" disabled>
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let busy = false;
let provider = 'anthropic';

// ── Settings ───────────────────────────────────────────────────────────────────
const KEY_LABELS = { anthropic: 'Claude API Key', groq: 'Groq API Key', openai: 'OpenAI API Key' };
const KEY_PH     = { anthropic: 'sk-ant-...', groq: 'gsk_...', openai: 'sk-...' };
const PROV_STORE = 'reader-provider', KEY_STORE = 'reader-llmkey';

function setProvider(p) {
  provider = p;
  document.querySelectorAll('.pvtab').forEach((b, i) =>
    b.classList.toggle('active', (i===0&&p==='groq')||(i===1&&p==='anthropic')||(i===2&&p==='openai')));
  $('key-label').textContent = KEY_LABELS[p] || 'API Key';
  $('llmKey').placeholder    = KEY_PH[p]     || 'API key';
  localStorage.setItem(PROV_STORE, p);
}

function toggleConfig() {
  $('config').classList.toggle('collapsed');
  $('settingsBtn').classList.toggle('open', !$('config').classList.contains('collapsed'));
}

function loadStoredKey() {
  const p = localStorage.getItem(PROV_STORE) || 'anthropic';
  const k = localStorage.getItem(KEY_STORE)  || '';
  setProvider(p);
  $('llmKey').value = k;
}

$('llmKey').addEventListener('change', () => localStorage.setItem(KEY_STORE, $('llmKey').value.trim()));

// ── Init: ping the server ──────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch('/zd-public', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ endpoint: '/help_center/categories' }),
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    $('status-dot').classList.add('ready');
    $('status-dot').title = 'Connected';
    $('sendBtn').disabled = false;
    renderSuggestions(d.categories || []);
  } catch (e) {
    $('status-dot').title = 'Error: ' + e.message;
    addMsg('agent', `<p>⚠️ Couldn't connect to Help Center: <strong>${escHtml(e.message)}</strong></p>`, 'error');
  }
}

function renderSuggestions(categories) {
  const chips = $('suggestion-chips');
  const defaults = ['How do I get started?', 'Billing & payments', 'Account settings', 'Troubleshooting'];
  const labels = categories.length ? categories.slice(0, 4).map(c => c.name) : defaults;
  chips.innerHTML = labels.map(l =>
    `<span class="chip" onclick="quickAsk(this,'${escAttr(l)}')">${escHtml(l)}</span>`
  ).join('');
}

// ── Chat ───────────────────────────────────────────────────────────────────────
function addMsg(role, html, type = '') {
  const wrap = $('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="bubble${type ? ' ' + type : ''}">${html}</div><span class="msg-time">${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function addTyping() {
  const wrap = $('messages');
  const div = document.createElement('div');
  div.className = 'msg agent'; div.id = 'typing';
  div.innerHTML = '<div class="bubble typing-wrap"><div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
  wrap.appendChild(div); wrap.scrollTop = wrap.scrollHeight;
}
function removeTyping() { const el = $('typing'); if (el) el.remove(); }

function quickAsk(btn, text) {
  document.querySelectorAll('.chip').forEach(c => c.disabled = true);
  $('userInput').value = text;
  send();
}

async function send() {
  const input = $('userInput');
  const text = input.value.trim();
  if (!text || busy) return;

  input.value = ''; input.style.height = '';
  addMsg('user', escHtml(text));
  busy = true; $('sendBtn').disabled = true; addTyping();

  try {
    const clientKey = $('llmKey').value.trim();
    const r = await fetch('/reader-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: text, ...(clientKey ? { llmKey: clientKey, provider } : {}) }),
    });
    const data = await r.json();
    removeTyping();

    if (data.error) {
      addMsg('agent', `<p>⚠️ ${escHtml(data.error)}</p>`, 'error');
      return;
    }

    // AI answer
    const msgDiv = addMsg('agent', data.answer || '<p>No answer generated.</p>');

    // Source articles
    if (data.sources?.length) {
      const srcWrap = document.createElement('div');
      srcWrap.className = 'sources';
      srcWrap.innerHTML = `<span class="sources-label">Sources</span>` +
        data.sources.map(s =>
          `<a class="source-chip" onclick="openArticle(${s.id}, '${escAttr(s.title)}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span>${escHtml(s.title)}</span>
          </a>`
        ).join('');
      msgDiv.appendChild(srcWrap);
      $('messages').scrollTop = $('messages').scrollHeight;
    }
  } catch (e) {
    removeTyping();
    addMsg('agent', `<p>Error: ${escHtml(e.message)}</p>`, 'error');
  } finally {
    busy = false; $('sendBtn').disabled = false;
    input.focus();
  }
}

// ── Open article inline ────────────────────────────────────────────────────────
async function openArticle(id, title) {
  addMsg('user', `Show me the full article: ${escHtml(title)}`);
  busy = true; $('sendBtn').disabled = true; addTyping();
  try {
    const r = await fetch('/zd-public', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ endpoint: `/help_center/articles/${id}` }),
    });
    const d = await r.json();
    removeTyping();
    const a = d.article;
    if (!a) { addMsg('agent', '<p>Article not found.</p>', 'error'); return; }
    const mins = Math.max(1, Math.round((a.body || '').replace(/<[^>]+>/g,' ').trim().split(/\s+/).length / 200));
    addMsg('agent',
      `<strong>${escHtml(a.title)}</strong><br>` +
      `<small style="color:var(--text-3)">Updated ${fmtDate(a.updated_at)} · ${mins} min read</small><br><br>` +
      (a.body || '<em>No content.</em>')
    );
  } catch (e) {
    removeTyping();
    addMsg('agent', `<p>Error: ${escHtml(e.message)}</p>`, 'error');
  } finally {
    busy = false; $('sendBtn').disabled = false;
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: d.getFullYear() !== new Date().getFullYear() ? 'numeric' : undefined });
}

// ── Auto-grow textarea ─────────────────────────────────────────────────────────
$('userInput').addEventListener('input', function () {
  this.style.height = '';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
$('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
loadStoredKey();
init();
</script>
</body>
</html>
