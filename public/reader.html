<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help Center</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1f73b7" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Help Center" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1f73b7; --blue-dark: #1a5e9a; --blue-light: #e8f2fc;
      --bg: #f3f4f6; --surface: #ffffff;
      --border: #dde1e5; --border-light: #edf0f2;
      --text: #1a1a1a; --text-2: #49545c; --text-3: #8a939a;
      --radius: 12px; --radius-s: 8px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg); min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    #app { max-width: 700px; margin: 0 auto; }

    /* ── Header ── */
    #header {
      background: var(--blue); color: #fff;
      padding: 14px 18px; display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 20;
      padding-top: max(14px, calc(env(safe-area-inset-top) + 14px));
    }
    #backBtn {
      background: none; border: none; color: rgba(255,255,255,.85); cursor: pointer;
      display: none; align-items: center; gap: 3px; font-size: 14px; font-family: inherit;
      padding: 4px 8px 4px 0; flex-shrink: 0; white-space: nowrap;
    }
    #backBtn.visible { display: flex; }
    #backBtn svg { width: 16px; height: 16px; }
    .hdr-logo { width: 30px; height: 30px; border-radius: 8px; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .hdr-logo svg { width: 16px; height: 16px; fill: #fff; }
    #header-title { font-size: 15px; font-weight: 650; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #searchToggleBtn {
      background: none; border: none; color: rgba(255,255,255,.85); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0; transition: background .15s;
    }
    #searchToggleBtn:hover { background: rgba(255,255,255,.12); }
    #searchToggleBtn svg { width: 17px; height: 17px; }

    /* ── Search bar ── */
    #search-wrap {
      background: var(--blue-dark);
      max-height: 0; overflow: hidden;
      transition: max-height .25s ease, padding .25s ease;
      padding: 0 18px;
    }
    #search-wrap.open { max-height: 72px; padding: 0 18px 14px; }
    #searchInput {
      width: 100%; padding: 11px 14px; border: none; border-radius: var(--radius-s);
      font-size: 16px; font-family: inherit; outline: none;
      background: #fff; color: var(--text);
    }
    #searchInput::placeholder { color: var(--text-3); }

    /* ── Content ── */
    #content { padding: 12px 0 48px; }

    /* ── State messages ── */
    .state-msg { padding: 52px 24px; text-align: center; color: var(--text-3); font-size: 14px; line-height: 1.65; }
    .state-msg strong { display: block; font-size: 17px; color: var(--text-2); margin-bottom: 6px; }

    /* ── Category label ── */
    .category-label {
      font-size: 11px; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: .06em;
      padding: 18px 20px 7px;
    }

    /* ── Section card ── */
    .section-card {
      background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
      margin: 0 16px 10px; display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      cursor: pointer; transition: box-shadow .15s, border-color .15s;
    }
    .section-card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.09); border-color: #bcc4cc; }
    .section-card:active { box-shadow: none; background: var(--blue-light); }
    .sec-icon {
      width: 44px; height: 44px; border-radius: 10px; background: var(--blue-light);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .sec-icon svg { width: 20px; height: 20px; color: var(--blue); }
    .sec-info { flex: 1; min-width: 0; }
    .sec-name { font-size: 14.5px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .sec-count { font-size: 12px; color: var(--text-3); margin-top: 2px; }
    .sec-arrow { color: var(--text-3); flex-shrink: 0; }
    .sec-arrow svg { width: 14px; height: 14px; }

    /* ── Article list ── */
    .article-list-card {
      background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
      margin: 0 16px 10px; overflow: hidden;
    }
    .article-row {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; cursor: pointer; transition: background .1s;
      border-top: 1px solid var(--border-light);
    }
    .article-row:first-child { border-top: none; }
    .article-row:hover { background: #f5f7fa; }
    .article-row:active { background: var(--blue-light); }
    .art-icon { width: 30px; height: 30px; border-radius: 7px; background: var(--blue-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .art-icon svg { width: 14px; height: 14px; color: var(--blue); }
    .art-info { flex: 1; min-width: 0; }
    .art-title { font-size: 13.5px; color: var(--text); line-height: 1.4; }
    .art-date { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .art-arrow { color: var(--text-3); flex-shrink: 0; }
    .art-arrow svg { width: 12px; height: 12px; }

    /* ── Article detail ── */
    #article-card {
      background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
      margin: 0 16px; overflow: hidden;
    }
    #article-head { padding: 22px 22px 16px; border-bottom: 1px solid var(--border-light); }
    #article-head-title { font-size: 19px; font-weight: 700; color: var(--text); line-height: 1.35; }
    #article-head-meta { margin-top: 9px; font-size: 12px; color: var(--text-3); display: flex; gap: 14px; flex-wrap: wrap; }
    #article-body {
      padding: 22px; font-size: 14px; line-height: 1.8; color: var(--text-2);
      overflow-wrap: break-word; word-break: break-word;
    }
    #article-body h1, #article-body h2 { font-size: 16px; font-weight: 700; color: var(--text); margin: 22px 0 8px; }
    #article-body h3 { font-size: 14.5px; font-weight: 700; color: var(--text); margin: 18px 0 6px; }
    #article-body p { margin: 6px 0; }
    #article-body ul, #article-body ol { padding-left: 20px; margin: 6px 0; }
    #article-body li { margin: 4px 0; }
    #article-body a { color: var(--blue); }
    #article-body img { max-width: 100%; border-radius: var(--radius-s); margin: 10px 0; display: block; }
    #article-body pre { background: var(--bg); border-radius: var(--radius-s); padding: 14px; overflow-x: auto; font-size: 12.5px; margin: 10px 0; }
    #article-body code { font-family: "SF Mono", Menlo, Monaco, monospace; font-size: .88em; background: var(--bg); padding: 1px 5px; border-radius: 3px; }
    #article-body pre code { background: none; padding: 0; }
    #article-body table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
    #article-body th, #article-body td { padding: 9px 12px; border: 1px solid var(--border); text-align: left; }
    #article-body th { background: var(--bg); font-weight: 600; color: var(--text); }

    /* ── Search results ── */
    .search-count { padding: 10px 20px 4px; font-size: 12px; color: var(--text-3); }
    .no-results { padding: 52px 24px; text-align: center; font-size: 14px; color: var(--text-3); line-height: 1.7; }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      body { background: var(--surface); }
      #app { max-width: 100%; }
      .section-card, .article-list-card, #article-card { margin-left: 12px; margin-right: 12px; }
      #article-head { padding: 18px 16px 14px; }
      #article-head-title { font-size: 17px; }
      #article-body { padding: 18px 16px; }
      #content { padding-bottom: max(48px, calc(env(safe-area-inset-bottom) + 24px)); }
    }

    /* ── Desktop card wrapper ── */
    @media (min-width: 641px) {
      body { padding: 32px 0 48px; }
      #app {
        background: var(--surface); border-radius: var(--radius);
        box-shadow: 0 4px 24px rgba(0,0,0,.1); overflow: hidden;
      }
      #header { position: static; border-radius: 0; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <button id="backBtn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <div class="hdr-logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <span id="header-title">Help Center</span>
    <button id="searchToggleBtn" onclick="toggleSearch()" title="Search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>

  <div id="search-wrap">
    <input id="searchInput" type="search" placeholder="Search articles…" autocomplete="off" oninput="onSearchInput(this.value)" />
  </div>

  <div id="content">
    <div class="state-msg"><strong>Loading…</strong>Fetching Help Center articles.</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

// ── State ──────────────────────────────────────────────────────────────────────
let categories = [], sections = [], articles = [];
let view = 'home';
let currentSectionId = null, currentArticleId = null;
let navHistory = [];
let articleCache = {};
let searchOpen = false;
let searchTimeout = null;

// ── API ────────────────────────────────────────────────────────────────────────
async function zdFetch(endpoint) {
  const r = await fetch('/zd-public', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ endpoint }),
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d;
}

// ── Init ───────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const [catRes, secRes] = await Promise.all([
      zdFetch('/help_center/categories'),
      zdFetch('/help_center/sections'),
    ]);
    categories = catRes.categories || [];
    sections   = secRes.sections   || [];

    let artUrl = '/help_center/articles?per_page=100&sort_by=updated_at&sort_order=desc';
    while (artUrl) {
      const r = await zdFetch(artUrl);
      articles.push(...(r.articles || []).filter(a => !a.draft));
      artUrl = r.next_page || null;
    }
    renderHome();
  } catch (e) {
    $('content').innerHTML = `<div class="state-msg"><strong>Couldn't load Help Center</strong>${escHtml(e.message)}</div>`;
  }
}

// ── Navigation ─────────────────────────────────────────────────────────────────
function navigate(newView, id, pushHistory = true) {
  if (pushHistory) navHistory.push({ view, sectionId: currentSectionId, articleId: currentArticleId });
  view = newView;
  if (newView === 'section') currentSectionId = id;
  if (newView === 'article') currentArticleId = id;
  $('backBtn').classList.toggle('visible', navHistory.length > 0);
  window.scrollTo(0, 0);
  if (newView === 'home')    renderHome();
  if (newView === 'section') renderSection(id);
  if (newView === 'article') renderArticle(id);
}

function goBack() {
  if (!navHistory.length) return;
  const prev = navHistory.pop();
  view = prev.view; currentSectionId = prev.sectionId; currentArticleId = prev.articleId;
  $('backBtn').classList.toggle('visible', navHistory.length > 0);
  window.scrollTo(0, 0);
  if (view === 'home')    renderHome();
  if (view === 'section') renderSection(currentSectionId);
  if (view === 'search')  renderHome(); // re-show home on back from search
}

// ── Home ───────────────────────────────────────────────────────────────────────
function renderHome() {
  $('header-title').textContent = 'Help Center';
  if (!sections.length) {
    $('content').innerHTML = '<div class="state-msg"><strong>No sections found</strong>Check your Zendesk configuration.</div>';
    return;
  }
  const countBySec = {};
  articles.forEach(a => { countBySec[a.section_id] = (countBySec[a.section_id] || 0) + 1; });

  const sectionIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`;
  const arrowIcon  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;

  let html = '';
  const catsWithSecs = categories.length
    ? categories.filter(c => sections.some(s => s.category_id === c.id))
    : [null];

  catsWithSecs.forEach(cat => {
    const secList = cat ? sections.filter(s => s.category_id === cat.id) : sections;
    if (!secList.length) return;
    if (cat) html += `<div class="category-label">${escHtml(cat.name)}</div>`;
    secList.forEach(sec => {
      const n = countBySec[sec.id] || 0;
      html += `<div class="section-card" onclick="navigate('section','${sec.id}')">
        <div class="sec-icon">${sectionIcon}</div>
        <div class="sec-info"><div class="sec-name">${escHtml(sec.name)}</div><div class="sec-count">${n} article${n !== 1 ? 's' : ''}</div></div>
        <div class="sec-arrow">${arrowIcon}</div>
      </div>`;
    });
  });
  $('content').innerHTML = html;
}

// ── Section ────────────────────────────────────────────────────────────────────
function renderSection(sectionId) {
  const sec = sections.find(s => String(s.id) === String(sectionId));
  $('header-title').textContent = sec?.name || 'Section';
  const secArts = articles.filter(a => String(a.section_id) === String(sectionId));
  if (!secArts.length) {
    $('content').innerHTML = '<div class="state-msg">No articles in this section.</div>';
    return;
  }
  const artIcon  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
  const arrowIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
  const rows = secArts.map(a => `
    <div class="article-row" onclick="navigate('article','${a.id}')">
      <div class="art-icon">${artIcon}</div>
      <div class="art-info"><div class="art-title">${escHtml(a.title)}</div><div class="art-date">${fmtDate(a.updated_at)}</div></div>
      <div class="art-arrow">${arrowIcon}</div>
    </div>`).join('');
  $('content').innerHTML = `<div class="article-list-card">${rows}</div>`;
}

// ── Article ────────────────────────────────────────────────────────────────────
async function renderArticle(articleId) {
  const meta = articles.find(a => String(a.id) === String(articleId));
  $('header-title').textContent = meta?.title || 'Article';
  $('content').innerHTML = '<div class="state-msg">Loading…</div>';
  try {
    let a = articleCache[articleId];
    if (!a) {
      const r = await zdFetch(`/help_center/articles/${articleId}`);
      a = r.article;
      if (a) articleCache[articleId] = a;
    }
    if (!a) { $('content').innerHTML = '<div class="state-msg">Article not found.</div>'; return; }
    const sec = sections.find(s => s.id === a.section_id);
    const words = (a.body || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().split(/\s+/).filter(Boolean).length;
    const mins = Math.max(1, Math.round(words / 200));
    $('header-title').textContent = a.title;
    $('content').innerHTML = `
      <div id="article-card">
        <div id="article-head">
          <div id="article-head-title">${escHtml(a.title)}</div>
          <div id="article-head-meta">
            ${sec ? `<span>${escHtml(sec.name)}</span>` : ''}
            <span>Updated ${fmtDate(a.updated_at)}</span>
            <span>${mins} min read</span>
          </div>
        </div>
        <div id="article-body">${a.body || '<em>No content.</em>'}</div>
      </div>`;
  } catch (e) {
    $('content').innerHTML = `<div class="state-msg"><strong>Error</strong>${escHtml(e.message)}</div>`;
  }
}

// ── Search ─────────────────────────────────────────────────────────────────────
function onSearchInput(q) {
  clearTimeout(searchTimeout);
  if (!q.trim()) {
    if (view === 'search') { navigate('home', null, false); navHistory = []; }
    return;
  }
  searchTimeout = setTimeout(() => doSearch(q.trim()), 380);
}

async function doSearch(q) {
  if (view !== 'search') navHistory.push({ view, sectionId: currentSectionId, articleId: currentArticleId });
  view = 'search';
  $('backBtn').classList.add('visible');
  $('header-title').textContent = `"${q}"`;
  $('content').innerHTML = '<div class="state-msg">Searching…</div>';
  try {
    const r = await zdFetch(`/help_center/articles/search?query=${encodeURIComponent(q)}&per_page=25`);
    const results = (r.results || []).filter(a => !a.draft);
    if (!results.length) {
      $('content').innerHTML = `<div class="no-results">No results for <strong>"${escHtml(q)}"</strong><br><br>Try different keywords.</div>`;
      return;
    }
    const artIcon  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
    const arrowIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
    const rows = results.map(a => {
      const sec = sections.find(s => s.id === a.section_id);
      return `<div class="article-row" onclick="navigate('article','${a.id}')">
        <div class="art-icon">${artIcon}</div>
        <div class="art-info"><div class="art-title">${escHtml(a.title)}</div><div class="art-date">${sec ? escHtml(sec.name) + ' · ' : ''}${fmtDate(a.updated_at)}</div></div>
        <div class="art-arrow">${arrowIcon}</div>
      </div>`;
    }).join('');
    $('content').innerHTML = `<div class="search-count">${results.length} result${results.length !== 1 ? 's' : ''}</div><div class="article-list-card">${rows}</div>`;
  } catch (e) {
    $('content').innerHTML = `<div class="state-msg"><strong>Search failed</strong>${escHtml(e.message)}</div>`;
  }
}

// ── Search toggle ──────────────────────────────────────────────────────────────
function toggleSearch() {
  searchOpen = !searchOpen;
  $('search-wrap').classList.toggle('open', searchOpen);
  if (searchOpen) {
    setTimeout(() => $('searchInput').focus(), 150);
  } else {
    $('searchInput').value = '';
    if (view === 'search') { navHistory = []; navigate('home', null, false); }
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: d.getFullYear() !== new Date().getFullYear() ? 'numeric' : undefined });
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

init();
</script>
</body>
</html>
